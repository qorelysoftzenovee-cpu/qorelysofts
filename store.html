<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>indapp store | Mobile Utility Client</title>
    <meta name="description" content="A Play Store-inspired mobile utility client for approved education, tech, sports and health, and sarkari applications.">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: '#312E81',
                        accent: '#16A34A'
                    },
                    boxShadow: {
                        handset: '0 24px 60px rgba(17, 24, 39, 0.10)',
                        soft: '0 14px 34px rgba(17, 24, 39, 0.08)'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-[#f5f7fb] text-[#111827] antialiased">
    <div class="mx-auto min-h-screen max-w-sm bg-white shadow-handset sm:my-6 sm:min-h-[860px] sm:rounded-[2.5rem] sm:border sm:border-[#F3F4F6] sm:max-w-[430px] sm:overflow-hidden">
        <header class="sticky top-0 z-30 bg-white/95 px-4 pb-4 pt-5 backdrop-blur sm:px-5">
            <div class="flex items-center gap-3 rounded-full border border-[#F3F4F6] bg-white px-4 py-3 shadow-soft">
                <span class="text-base text-gray-400">⌕</span>
                <input type="text" placeholder="Search for apps & utilities..." class="w-full bg-transparent text-sm text-[#111827] outline-none placeholder:text-gray-400">
                <div class="flex h-9 w-9 items-center justify-center rounded-full bg-[#F3F4F6] text-xs font-bold text-gray-500">U</div>
            </div>

            <div class="mt-4 flex gap-2 overflow-x-auto pb-1 [-ms-overflow-style:none] [scrollbar-width:none] [&::-webkit-scrollbar]:hidden">
                <button data-filter="Education" class="category-pill whitespace-nowrap rounded-full bg-brand px-4 py-2.5 text-sm font-bold text-white">Education</button>
                <button data-filter="Tech" class="category-pill whitespace-nowrap rounded-full border border-[#F3F4F6] bg-white px-4 py-2.5 text-sm font-bold text-[#111827]">Tech Utilities</button>
                <button data-filter="Sports" class="category-pill whitespace-nowrap rounded-full border border-[#F3F4F6] bg-white px-4 py-2.5 text-sm font-bold text-[#111827]">Sports &amp; Health</button>
                <button data-filter="Govt" class="category-pill whitespace-nowrap rounded-full border border-[#F3F4F6] bg-white px-4 py-2.5 text-sm font-bold text-[#111827]">Sarkari Utilities</button>
            </div>
        </header>

        <main class="space-y-8 px-4 pb-8 pt-3 sm:px-5">
            <section>
                <div class="mb-4 flex items-center justify-between">
                    <h1 class="text-xl font-black tracking-tight text-[#111827]">Top Rated Utilities</h1>
                    <span class="text-xs font-semibold uppercase tracking-[0.18em] text-gray-400">Live</span>
                </div>
                <div id="top-rated-row" class="flex gap-4 overflow-x-auto pb-2 snap-x snap-mandatory [-ms-overflow-style:none] [scrollbar-width:none] [&::-webkit-scrollbar]:hidden"></div>
            </section>

            <section>
                <div class="mb-4 flex items-center justify-between">
                    <h2 class="text-xl font-black tracking-tight text-[#111827]">New &amp; Updated Apps</h2>
                    <span class="text-xs font-semibold uppercase tracking-[0.18em] text-gray-400">Auto Sync</span>
                </div>
                <div id="new-updated-row" class="flex gap-4 overflow-x-auto pb-2 snap-x snap-mandatory [-ms-overflow-style:none] [scrollbar-width:none] [&::-webkit-scrollbar]:hidden"></div>
            </section>
        </main>
    </div>

    <script>
        const SUPABASE_URL = 'https://ypbcnndadggdamiwqkfn.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlwYmNubmRhZGdnZGFtaXdxa2ZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5Mzg5NTAsImV4cCI6MjA5OTUxNDk1MH0.DJHANfWjfMr9qXs0XTPyJcIoM9zq7YHcqWhLtkYrdXs';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const allowedCategories = ['Education', 'Tech', 'Sports', 'Govt'];
        const categoryPills = document.querySelectorAll('.category-pill');
        const topRatedRow = document.getElementById('top-rated-row');
        const newUpdatedRow = document.getElementById('new-updated-row');
        let activeCategory = 'Education';
        let approvedApps = [];

        function formatCategory(category) {
            const labels = {
                Education: 'Education',
                Tech: 'Tech Utilities',
                Sports: 'Sports & Health',
                Govt: 'Sarkari Utilities'
            };
            return labels[category] || category;
        }

        function randomSize(id) {
            const base = 8 + ((Number(id) || 1) % 11);
            return `${base} MB`;
        }

        function createInstallCard(app) {
            const wrapper = document.createElement('article');
            wrapper.className = 'min-w-[170px] max-w-[170px] snap-start';
            wrapper.innerHTML = `
                <div class="rounded-[1.75rem] border border-[#F3F4F6] bg-white p-4 shadow-soft">
                    <div class="flex h-16 w-16 items-center justify-center rounded-[1.4rem] bg-[#F3F4F6] text-2xl">${app.icon || '📱'}</div>
                    <h3 class="mt-4 line-clamp-2 text-sm font-bold text-[#111827]">${app.title}</h3>
                    <p class="mt-1 truncate text-xs font-medium text-gray-500">${app.developer_name || 'Verified Publisher'}</p>
                    <p class="mt-2 text-xs text-gray-400">${randomSize(app.id)}</p>
                    <button class="install-btn mt-4 inline-flex w-full items-center justify-center rounded-full bg-accent px-3 py-2.5 text-xs font-bold text-white transition hover:bg-green-700" data-app-id="${app.id}">Install</button>
                </div>
            `;

            const button = wrapper.querySelector('.install-btn');
            button.addEventListener('click', () => simulateInstall(button));
            return wrapper;
        }

        function simulateInstall(button) {
            if (button.dataset.installing === 'true') return;
            button.dataset.installing = 'true';
            let progress = 0;
            button.textContent = 'Preparing...';

            const interval = setInterval(() => {
                progress += 20;
                if (progress >= 100) {
                    clearInterval(interval);
                    button.textContent = 'Installed';
                    button.classList.remove('bg-accent', 'hover:bg-green-700');
                    button.classList.add('bg-brand');
                    return;
                }
                button.textContent = `Installing ${progress}%`;
            }, 350);
        }

        function setActiveCategory(category) {
            activeCategory = category;
            categoryPills.forEach((pill) => {
                const active = pill.dataset.filter === category;
                pill.className = `category-pill whitespace-nowrap rounded-full border px-4 py-2.5 text-sm font-bold transition ${active ? 'border-brand bg-brand text-white' : 'border-[#F3F4F6] bg-white text-[#111827]'}`;
            });
            renderShelves();
        }

        function getFilteredApps() {
            return approvedApps.filter((app) => app.category === activeCategory);
        }

        function renderRow(container, apps, emptyMessage) {
            container.innerHTML = '';
            if (!apps.length) {
                const emptyCard = document.createElement('div');
                emptyCard.className = 'min-w-full rounded-[1.75rem] border border-dashed border-[#F3F4F6] bg-[#FAFAFA] p-5 text-sm text-gray-500';
                emptyCard.textContent = emptyMessage;
                container.appendChild(emptyCard);
                return;
            }
            apps.forEach((app) => container.appendChild(createInstallCard(app)));
        }

        function renderShelves() {
            const filtered = getFilteredApps();
            const topRated = [...filtered].sort((a, b) => Number(b.is_suggested || 0) - Number(a.is_suggested || 0)).slice(0, 10);
            const newest = [...filtered].sort((a, b) => Number(b.id || 0) - Number(a.id || 0)).slice(0, 10);

            renderRow(topRatedRow, topRated, `No approved ${formatCategory(activeCategory).toLowerCase()} tools are available yet.`);
            renderRow(newUpdatedRow, newest, `No fresh approved ${formatCategory(activeCategory).toLowerCase()} apps are available right now.`);
        }

        async function fetchApprovedApps() {
            const { data, error } = await supabaseClient
                .from('apps')
                .select('*')
                .eq('verification_status', 'approved')
                .in('category', allowedCategories)
                .order('id', { ascending: false });

            if (error) throw error;
            approvedApps = data || [];
            renderShelves();
        }

        categoryPills.forEach((pill) => {
            pill.addEventListener('click', () => setActiveCategory(pill.dataset.filter));
        });

        document.addEventListener('DOMContentLoaded', async () => {
            setActiveCategory('Education');
            await fetchApprovedApps();

            supabaseClient
                .channel('apps-live-cloud-stream')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'apps' }, () => fetchApprovedApps())
                .subscribe();
        });
    </script>
</body>
</html>
